<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>jcode mobile – Chat</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page">
  <div class="phone">
    <div class="canvas">
      <div class="statusbar">
        <div>9:41</div>
        <div class="mono">5G</div>
      </div>
      <div class="topbar">
        <div class="topbar-left">
          <div class="dot"></div>
          <div class="topbar-name">jcode</div>
        </div>
        <div class="model-tag mono">sonnet-4</div>
      </div>
      <div class="messages">
        <div class="msg msg-system">Connected over Tailscale</div>
        <div class="msg msg-user">Summarize the reload path and check build status.</div>
        <div class="msg msg-assistant">Checked the server reload flow and verified selfdev hooks. Tightening the handoff next.</div>
        <div class="tool mono">
          <div class="tool-header"><div class="tool-dot"></div>selfdev</div>
          <div class="tool-output">{"action":"status"}</div>
        </div>
        <div class="msg msg-assistant">Prepared a mobile-first concept for the iOS client handoff.</div>
      </div>
      <div class="composer-bar">
        <div class="compose-field">Message…</div>
        <div class="send-btn">↑</div>
      </div>
    </div>
  </div>
</body>
</html>
