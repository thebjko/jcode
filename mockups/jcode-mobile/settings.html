<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>jcode mobile – Settings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page">
  <div class="phone">
    <div class="canvas">
      <div class="statusbar">
        <div>9:41</div>
        <div class="mono">5G</div>
      </div>
      <div class="nav-bar">
        <div class="title">Settings</div>
        <div class="action">Done</div>
      </div>
      <div class="settings-body">
        <section>
          <div class="section-label">Connection</div>
          <div class="connection-row">
            <div class="dot"></div>
            <div class="info">
              <div class="status">Connected</div>
              <div class="host mono">macbook:7643</div>
            </div>
            <div class="disconnect-btn">Disconnect</div>
          </div>
        </section>
        <section>
          <div class="section-label">Sessions</div>
          <div class="list-group">
            <div class="list-item active"><span class="mono">fox</span><span class="check">●</span></div>
            <div class="list-item"><span class="mono">canary</span></div>
            <div class="list-item"><span class="mono">ios-pairing</span></div>
          </div>
        </section>
        <section>
          <div class="section-label">Model</div>
          <div class="list-group">
            <div class="list-item active"><span class="mono">claude-sonnet-4</span><span class="check">●</span></div>
            <div class="list-item"><span class="mono">gpt-5</span></div>
            <div class="list-item"><span class="mono">qwen-3-coder</span></div>
          </div>
        </section>
      </div>
    </div>
  </div>
</body>
</html>
