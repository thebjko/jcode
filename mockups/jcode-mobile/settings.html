<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>jcode mobile – Settings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page">
  <div class="phone">
    <div class="canvas">
      <div class="statusbar">
        <div>9:41</div>
        <div class="mono">5G</div>
      </div>
      <div class="nav-bar">
        <div class="title">Settings</div>
        <div class="action">Done</div>
      </div>
      <div class="settings-body">
        <section>
          <div class="section-label">Connection</div>
          <div class="connection-row">
            <div class="dot"></div>
            <div class="info">
              <div class="status">Connected</div>
              <div class="host mono">macbook:7643</div>
            </div>
            <div class="disconnect-btn">Disconnect</div>
          </div>
        </section>

        <section>
          <div class="section-label">Servers</div>
          <div class="list-group">
            <div class="list-item active">
              <div>
                <div class="mono">macbook</div>
                <div class="sub">Primary paired machine</div>
              </div>
              <span class="check">●</span>
            </div>
            <div class="list-item">
              <div>
                <div class="mono">studio-mac</div>
                <div class="sub">Available</div>
              </div>
            </div>
            <div class="list-item">
              <span>Add Server</span>
              <span class="row-meta">+</span>
            </div>
            <div class="list-item">
              <span>Scan QR Code</span>
              <span class="row-meta">⌁</span>
            </div>
          </div>
        </section>

        <section>
          <div class="section-label">Preferences</div>
          <div class="list-group">
            <div class="list-item">
              <span>Notifications</span>
              <span class="toggle-pill toggle-on"><span></span></span>
            </div>
            <div class="list-item">
              <span>Haptics</span>
              <span class="toggle-pill toggle-on"><span></span></span>
            </div>
            <div class="list-item">
              <span>Theme</span>
              <span class="row-meta mono">Dark</span>
            </div>
          </div>
        </section>

        <section>
          <div class="section-label">About</div>
          <div class="list-group">
            <div class="list-item">
              <span>Version</span>
              <span class="row-meta mono">0.4.2-dev</span>
            </div>
            <div class="list-item">
              <span>Privacy</span>
              <span class="row-meta">›</span>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>
</body>
</html>
