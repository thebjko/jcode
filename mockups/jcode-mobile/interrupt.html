<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>jcode mobile – Interrupt</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page">
  <div class="phone">
    <div class="canvas">
      <div class="statusbar" style="opacity:0.3;">
        <div>9:41</div>
        <div class="mono">5G</div>
      </div>
      <div class="sheet-bg"></div>
      <div class="sheet" style="min-height:280px;">
        <div class="sheet-handle"></div>
        <div class="sheet-top">
          <div class="sheet-title">Interrupt</div>
          <div style="display:flex; gap:16px; align-items:center;">
            <span style="color:var(--text-3); font-size:14px;">Cancel</span>
            <span style="color:var(--accent); font-size:14px; font-weight:600;">Send</span>
          </div>
        </div>
        <div class="textarea-mock">Prioritize the mobile handoff first.</div>
      </div>
    </div>
  </div>
</body>
</html>
